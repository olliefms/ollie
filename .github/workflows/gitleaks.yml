# .github/workflows/gitleaks.yml
# Secret-scan guard. Fails the build if any commit introduces a secret.
# Runs the gitleaks CLI directly (MIT-licensed, free) rather than
# gitleaks/gitleaks-action, which requires a paid license for organizations.
name: gitleaks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.24.3"
  # SHA-256 of gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz (from the release checksums).
  # Bumping GITLEAKS_VERSION requires updating this digest.
  GITLEAKS_SHA256: "9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # full history so the scan matches local runs
      - name: Install gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm gitleaks.tar.gz
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact
