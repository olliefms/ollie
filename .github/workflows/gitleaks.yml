# .github/workflows/gitleaks.yml
# Secret-scan guard. Fails the build if any commit introduces a secret.
name: gitleaks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read   # gitleaks-action needs this to post PR annotations

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the scan matches local runs
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required by gitleaks-action to scan pull_request events
          GITLEAKS_CONFIG: .gitleaks.toml
