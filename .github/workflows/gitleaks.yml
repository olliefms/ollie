# .github/workflows/gitleaks.yml
# Secret-scan guard. Fails the build if any commit introduces a secret.
# Runs the gitleaks CLI directly (MIT-licensed, free) rather than
# gitleaks/gitleaks-action, which requires a paid license for organizations.
name: gitleaks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.24.3"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # full history so the scan matches local runs
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact
