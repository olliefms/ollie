# .github/workflows/claude-code-review.yml
# Agent PR review — shadow mode (comments and labels only, never merges).
# Fires on every PR open/update. Applies the Ollie shippability bar from
# AGENTS.md and posts a structured review comment with AGENT_META block.

name: Agent Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true  # newer push supersedes in-flight review

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Circuit breaker ──────────────────────────────────────────────────
      - name: Check for pause:agents circuit breaker
        id: circuit_breaker
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          PAUSED=$(echo "$LABELS" | jq -r '[.[].name] | contains(["pause:agents"])')
          echo "paused=$PAUSED" >> "$GITHUB_OUTPUT"
          if [ "$PAUSED" = "true" ]; then
            echo "Circuit breaker active — skipping review."
          fi

      # ── 2. Skip bot PRs ────────────────────────────────────────────────────
      # GitHub restricts GITHUB_TOKEN to read-only for bot-authored PRs
      # (dependabot, github-actions, etc.), so label writes would fail.
      # Bot PRs skip the agent entirely; human maintainer merges at discretion.
      - name: Check for bot author
        if: steps.circuit_breaker.outputs.paused != 'true'
        id: bot_check
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [[ "$AUTHOR" == *"[bot]" ]]; then
            echo "is_bot=true" >> "$GITHUB_OUTPUT"
            echo "Bot PR ($AUTHOR) — skipping agent review."
          else
            echo "is_bot=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. Checkout (full — agent needs to read AGENTS.md and diff) ─────────
      - name: Checkout
        if: |
          steps.circuit_breaker.outputs.paused != 'true' &&
          steps.bot_check.outputs.is_bot != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 4. Resolve trust tier ───────────────────────────────────────────────
      - name: Resolve trust tier
        if: |
          steps.circuit_breaker.outputs.paused != 'true' &&
          steps.bot_check.outputs.is_bot != 'true'
        id: trust
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          YQ_VERSION="v4.44.1"
          wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

          TIER="new"
          for candidate in maintainer trusted contributor blocked; do
            USERS=$(yq e ".${candidate}.users[]" .github/trust-list.yml 2>/dev/null || true)
            if echo "$USERS" | grep -qx "$AUTHOR"; then
              TIER="$candidate"
              break
            fi
          done

          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "Resolved '$AUTHOR' → $TIER"

      # ── 5. Run review agent ─────────────────────────────────────────────────
      - name: Run review agent
        if: |
          steps.circuit_breaker.outputs.paused != 'true' &&
          steps.bot_check.outputs.is_bot != 'true' &&
          steps.trust.outputs.tier != 'blocked'
        uses: anthropics/claude-code-action@v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          TRUST_TIER: ${{ steps.trust.outputs.tier }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The prompt drives the review entirely through the gh CLI (read the
          # diff, post one comment, apply one label). Without this allowlist the
          # SDK auto-denies those tool calls in CI, so the agent runs "green" but
          # posts nothing. Scoped per-subcommand rather than blanket Bash(gh:*).
          claude_args: |
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr edit:*),Bash(git diff:*),Bash(git merge-base:*),Read,Grep,Glob"
          prompt: |
            You are the Ollie review agent. Your identifier is: `🤖 [agent:review]`

            ## Your Task

            Review the pull request described below against the Ollie shippability
            bar. You will:
            1. Read AGENTS.md for the full technical shippability bar and codebase rules
            2. Review the PR diff for blockers, significants, and nits
            3. Post a structured review comment
            4. Apply exactly one `review:*` label based on your findings

            You will NOT merge the PR, approve it formally, or request changes via
            the GitHub review system. Post one comment and apply one label only.

            ## Injected Context

            - PR number: ${{ github.event.pull_request.number }}
            - PR author: ${{ github.event.pull_request.user.login }}
            - Author trust tier: ${{ steps.trust.outputs.tier }}
            - PR title: ${{ github.event.pull_request.title }}
            - PR head SHA: ${{ github.event.pull_request.head.sha }}
              (the PR's tip commit — use THIS as the review checkpoint, not
              `git rev-parse HEAD`. On a pull_request event the checkout is the
              ephemeral `refs/pull/N/merge` commit, which is recreated on every
              push; the head SHA is stable and is a parent of the merge commit,
              so it is present in the fetched history.)

            ## Shippability Bar (authoritative version is in AGENTS.md — read it first)

            **Blockers** — must fix before merge:
            - Correctness bug: wrong output, wrong status code, wrong DB state
            - Security bug: auth bypass, injection, data leakage, unvalidated input
            - Data-loss risk: non-atomic mutation, missing upsert, delete without guard
            - Broken contract: API shape change without migration, public type removed

            **Significants** — flag but do not block. A finding is significant
            ONLY if you can name a concrete failure mode: a specific input,
            state, or call sequence that produces wrong behavior (wrong output,
            wrong status code, wrong DB state, crash, or data drift). State that
            failure mode explicitly in the finding.
            - Real bugs in non-critical paths, with the triggering input/state named
            - Missing test coverage where you can describe the regression that would slip through
            - Edge-case correctness issues (DST, off-by-one, etc.) with the triggering case named

            If you cannot name a concrete failure mode, it is NOT significant.
            Convention-adherence items ("rule X says add Y to list Z", "register
            this type in `schemas()`") with no demonstrated failure are nits, not
            significants — especially when the framework or tooling already
            resolves the concern. When torn between significant and nit, choose nit.

            **Nits** — note in comment only, never block, never file as issues:
            - Style, taste, micro-optimisations
            - Refactor opportunities unrelated to the change
            - Convention-adherence items with no demonstrated failure mode

            Report nits for every trust tier, including `maintainer`. Nits give
            borderline items a place to land so they stop inflating into
            significants. Keep each nit to one line.

            **Loop termination:** This is the review agent. If you find blockers,
            say so clearly. The human decides whether to fix or override. Do not
            re-review unless a new commit is pushed (the workflow handles that).

            **Convergence across re-reviews:** Each push triggers a fresh review
            preserved as its own comment. To stop resampling the whole diff every
            push and make the loop converge:
            - Let HEAD_SHA be the PR head SHA from Injected Context
              (`${{ github.event.pull_request.head.sha }}`), NOT `git rev-parse HEAD`.
            - Before reviewing, read your prior `🤖 [agent:review]` comments on
              this PR (`gh pr view`) and parse the most recent AGENT_META block
              for its `reviewed_sha` and `iteration`.
            - If a prior review exists AND its `reviewed_sha` is an ancestor of
              HEAD_SHA (verify: `git merge-base --is-ancestor <reviewed_sha> HEAD_SHA`),
              review ONLY the incremental diff `git diff <reviewed_sha>..HEAD_SHA` —
              the commits pushed since your last review. Carry every
              still-applicable prior finding forward into this round's comment,
              then add any new findings from the incremental diff. Set `iteration`
              to the prior value plus 1.
            - If there is no prior review, OR the prior `reviewed_sha` is missing
              or not an ancestor of HEAD_SHA (force-push / rebase), review the full
              PR diff and set `iteration` to 1.
            - Always record HEAD_SHA as `reviewed_sha` in this round's AGENT_META.
            This makes the loop cumulative and converging: findings accumulate and
            persist instead of a fresh 1–2 being sampled on every push.

            **No robot homework:** Do not create follow-up issues. Do not add TODO
            comments. Note nits inline in the comment only.

            ## Review Labels

            Apply exactly one:
            - `review:approved` — no blockers, significants are minor or absent
            - `review:changes-requested` — one or more blockers found

            ## Comment Format

            Post a new review comment for every review. On re-review (a new
            commit), add a fresh comment rather than editing your prior one, so
            each review iteration is preserved as its own comment in the thread
            — see step 4. The comment body:

            ```
            🤖 [agent:review]

            [1–3 sentence summary of the overall assessment.]

            ### Blockers
            [List each blocker with file:line reference. "None." if clean.]

            ### Significants
            [List each significant. "None." if clean.]

            ### Nits
            [List nits briefly. "None." if clean.]

            <!-- AGENT_META {"v":1,"agent":"review","ts":"UTC_NOW","trust_tier":"TIER","decision":"approved|changes-requested","blocker_count":N,"significant_count":N,"nit_count":N,"iteration":N,"reviewed_sha":"HEAD_SHA"} -->
            ```

            Rules:
            - No hedging. No em-dashes. Direct.
            - Report nits for every trust tier, including `maintainer`. Do not suppress them.
            - File:line references are required for every blocker and significant.
            - `iteration` and `reviewed_sha` follow the convergence rules above; do
              not hardcode `iteration` to 1 on a re-review.
            - Keep the JSON compact in the AGENT_META block.

            ## Steps

            1. HEAD_SHA is the PR head SHA from Injected Context
               (`${{ github.event.pull_request.head.sha }}`). Use it as the
               review checkpoint; do NOT use `git rev-parse HEAD` (that resolves
               to the ephemeral merge commit).
            2. Read your prior review state:
               `gh pr view ${{ github.event.pull_request.number }} --repo ergofobe/ollie --json comments`
               Find the most recent `🤖 [agent:review]` comment and parse its
               AGENT_META for `reviewed_sha` and `iteration`. If none exists, this
               is iteration 1.
            3. Read AGENTS.md for codebase-specific rules (version constraints,
               DB patterns, test patterns, OpenAPI requirements, etc.).
            4. Choose the diff scope per the Convergence rules:
               - First review, or prior `reviewed_sha` not an ancestor of HEAD_SHA:
                 full diff via `gh pr diff ${{ github.event.pull_request.number }} --repo ergofobe/ollie`.
               - Re-review with a valid prior `reviewed_sha` (confirm with
                 `git merge-base --is-ancestor <reviewed_sha> HEAD_SHA`): incremental
                 diff via `git diff <reviewed_sha>..HEAD_SHA`. Carry prior findings
                 forward, then add new ones from this incremental diff.
            5. Review against the shippability bar. Apply the significant-vs-nit
               test: significant requires a named failure mode; convention-only
               items are nits.
            6. Post a new comment. Always create a fresh comment so each
               re-review is preserved as its own entry in the thread. Do NOT
               use `--edit-last`. Set `reviewed_sha` to HEAD_SHA and
               `iteration` per the convergence rules:
               `gh pr comment ${{ github.event.pull_request.number }} --body "..." --repo ergofobe/ollie`
            7. Apply the label:
               `gh pr edit ${{ github.event.pull_request.number }} --add-label "review:DECISION" --repo ergofobe/ollie`

            Now perform the review.
