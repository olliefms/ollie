<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollie Fleet</title>
  <link rel="stylesheet" href="/fleet/css/base.css?v=2.1.0">
  <link rel="stylesheet" href="/fleet/css/components.css?v=2.1.0">
</head>
<body>
  <!-- Login view (shown when not authenticated) -->
  <div id="login-view" class="login-view">
    <div class="login-card">
      <!-- Sign-in form (shown once at least one user exists) -->
      <div id="login-pane" hidden>
        <div class="login-card__header">
          <div class="login-card__title">Ollie Fleet</div>
          <div class="login-card__subtitle">Sign in to your dispatcher account</div>
        </div>
        <form id="login-form" class="login-card__form" novalidate>
          <div id="login-alert" hidden></div>
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input
              class="form-input"
              id="login-email"
              type="email"
              autocomplete="email"
              required
              placeholder="dispatcher@example.com"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input
              class="form-input"
              id="login-password"
              type="password"
              autocomplete="current-password"
              required
              placeholder="••••••••"
            >
          </div>
          <button class="btn btn--primary btn--full" type="submit" id="login-submit">
            Sign in
          </button>
        </form>
      </div>

      <!-- First-run owner setup (shown when no users exist yet) -->
      <div id="setup-pane" hidden>
        <div class="login-card__header">
          <div class="login-card__title">Welcome to Ollie</div>
          <div class="login-card__subtitle">Create the owner account to get started</div>
        </div>
        <form id="setup-form" class="login-card__form" novalidate>
          <div id="setup-alert" hidden></div>
          <div class="form-group">
            <label class="form-label" for="setup-name">Name</label>
            <input
              class="form-input"
              id="setup-name"
              type="text"
              autocomplete="name"
              required
              placeholder="Jane Owner"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="setup-email">Email</label>
            <input
              class="form-input"
              id="setup-email"
              type="email"
              autocomplete="email"
              required
              placeholder="owner@example.com"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="setup-password">Password</label>
            <input
              class="form-input"
              id="setup-password"
              type="password"
              autocomplete="new-password"
              required
              placeholder="••••••••"
            >
          </div>
          <button class="btn btn--primary btn--full" type="submit" id="setup-submit">
            Create owner account
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- App shell (shown when authenticated) -->
  <div id="app-shell" class="shell" hidden>
    <!-- Sidebar navigation -->
    <nav class="sidebar">
      <div class="sidebar__logo">Ollie Fleet</div>
      <nav class="sidebar__nav">
        <a class="sidebar__link" data-link href="/fleet/home"><span>Home</span></a>
        <a class="sidebar__link" data-link href="/fleet/loads"><span>Loads</span></a>
        <a class="sidebar__link" data-link href="/fleet/trips"><span>Trips</span></a>
        <a class="sidebar__link" data-link href="/fleet/drivers"><span>Drivers</span></a>
        <a class="sidebar__link" data-link href="/fleet/facilities"><span>Facilities</span></a>
        <div class="sidebar__group-label">Equipment</div>
        <a class="sidebar__link" data-link href="/fleet/trucks"><span>Trucks</span></a>
        <a class="sidebar__link" data-link href="/fleet/trailers"><span>Trailers</span></a>
        <a class="sidebar__link" data-link href="/fleet/events"><span>Events</span></a>
        <a class="sidebar__link" data-link href="/fleet/documents"><span>Documents</span></a>
        <a class="sidebar__link" data-link href="/fleet/terminals"><span>Terminals</span></a>
        <a class="sidebar__link" data-link href="/fleet/account"><span>Account</span></a>
      </nav>
      <div class="sidebar__footer">
        <button class="btn btn--ghost" id="logout-btn" style="width:100%; justify-content:flex-start; padding-left: 0;">
          Sign out
        </button>
      </div>
    </nav>

    <!-- Top bar -->
    <header class="topbar">
      <span class="topbar__title" id="topbar-title">Loads</span>
      <div class="topbar__actions">
        <span class="refresh-indicator" id="refresh-indicator"></span>
      </div>
    </header>

    <!-- Main content area -->
    <main class="content" id="main-content">
      <div class="state-loading"><div class="spinner"></div></div>
    </main>
  </div>

  <script type="module" src="/fleet/app.js?v=2.1.0"></script>
</body>
</html>
